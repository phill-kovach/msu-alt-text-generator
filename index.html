<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Missouri State Alt Text Generator</title>
  
  <link rel="manifest" href="./manifest.json" />
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(registration => {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(err => {
            console.log('Service Worker registration failed:', err);
          });
      });
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-[#5E0009]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const ClipboardIcon = () => (
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
      >
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
      </svg>
    );

    const App = () => {
      const [image, setImage] = useState(null);
      const [altText, setAltText] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [isDragging, setIsDragging] = useState(false);
      const [message, setMessage] = useState('');
      const [showApiKeyInput, setShowApiKeyInput] = useState(true);
      
      const [apiKey, setApiKey] = useState(() => {
        try {
          const storedKey = localStorage.getItem('apiKey');
          return storedKey || '';
        } catch (error) {
          console.error("Error accessing localStorage:", error);
          return '';
        }
      });
      
      useEffect(() => {
        if (apiKey) {
          setShowApiKeyInput(false);
        }
      }, []);

      const saveApiKey = () => {
        if (apiKey) {
          try {
            localStorage.setItem('apiKey', apiKey);
            setShowApiKeyInput(false);
            setMessage('API Key saved successfully!');
          } catch (error) {
            console.error("Error saving to localStorage:", error);
            setMessage('Error saving API Key. Please try again.');
          }
        } else {
          setMessage('Please enter a valid API Key.');
        }
      };
      
      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        const file = e.dataTransfer.files[0];
        if (file) {
          if (!file.type.startsWith('image/')) {
            setMessage('Please drop a valid image file.');
            return;
          }
          handleFile(file);
        }
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          handleFile(file);
        }
      };

      const handleFile = (file) => {
        setAltText('');
        setMessage('');
        const reader = new FileReader();
        reader.onloadend = () => {
          const base64Data = reader.result.split(',')[1];
          setImage(reader.result);
          generateAltText(base64Data, file.type);
        };
        reader.onerror = () => {
          setMessage('Error reading file. Please try again.');
        };
        reader.readAsDataURL(file);
      };

      const generateAltText = async (base64Data, mimeType) => {
        if (!apiKey) {
          setMessage('Please enter a valid API Key to use this feature.');
          return;
        }

        setIsLoading(true);
        setMessage('Analyzing image...');

        try {
          const prompt = "Describe this image in a concise and detailed manner for alt text purposes. Focus on key visual elements, colors, and the subject matter. Start directly with the description without any introductory phrases like 'The image shows...'. STRICT REQUIREMENT: Your entire response must be 250 characters or less.";
          
          const payload = {
            contents: [
              {
                role: "user",
                parts: [
                  { text: prompt },
                  {
                    inlineData: {
                      mimeType: mimeType,
                      data: base64Data
                    }
                  }
                ]
              }
            ],
          };

          // Switched to the active gemini-2.0-flash model
          const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

          let response = null;
          let delay = 1000;
          const maxRetries = 3;
          let retries = 0;

          while (retries < maxRetries) {
            try {
              response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });

              if (!response.ok) {
                // Parse the exact error from Google if possible
                const errorData = await response.json().catch(() => ({}));
                const errorMessage = errorData?.error?.message || response.statusText;

                // If it's a rate limit (429) or Server Error (500+), throw to trigger a retry
                if (response.status === 429 || response.status >= 500) {
                   throw new Error(`Retryable status: ${response.status}`);
                }
                
                // If it's a 400 Bad Request or 403 Forbidden, do NOT retry. Bubble up the exact error.
                let fatalError = new Error(`API Error ${response.status}: ${errorMessage}`);
                fatalError.isFatal = true; 
                throw fatalError;
              }
              break; // Success! Break out of the retry loop.
            } catch (error) {
              // If it's a permanent error (like a bad API key), throw it immediately
              if (error.isFatal) {
                throw error; 
              }
              
              retries++;
              if (retries >= maxRetries) {
                throw error;
              }
              await new Promise(resolve => setTimeout(resolve, delay));
              delay *= 2;
            }
          }

          if (!response) {
            throw new Error('Failed to fetch from API after multiple retries.');
          }

          const result = await response.json();
          
          // Log the raw result to the browser console so we can see exactly what Gemini is saying
          console.log("Raw Gemini API Response:", result);

          // Check if the API blocked the response due to safety filters
          const finishReason = result?.candidates?.[0]?.finishReason;
          if (finishReason === 'SAFETY' || finishReason === 'BLOCKLIST') {
             setMessage('The image was blocked by Google\'s safety filters. Please try a different image.');
             setIsLoading(false);
             return;
          }

          const generatedText = result?.candidates?.[0]?.content?.parts?.[0]?.text;

          if (generatedText) {
            setAltText(generatedText);
            setMessage('Alt text generated successfully!');
          } else {
            setMessage('Could not generate alt text. Check the browser console (Right Click -> Inspect -> Console) for details.');
          }
        } catch (error) {
          console.error('Error generating alt text:', error);
          // Show the actual error message to the user in the UI
          setMessage(`Error: ${error.message || 'Check the console for details.'}`);
        } finally {
          setIsLoading(false);
        }
      };

      const copyToClipboard = () => {
        if (altText) {
          const tempInput = document.createElement('input');
          tempInput.value = altText;
          document.body.appendChild(tempInput);
          tempInput.select();
          document.execCommand('copy');
          document.body.removeChild(tempInput);
          setMessage('Alt text copied to clipboard!');
        }
      };
      
      const clearApiKey = () => {
        try {
          localStorage.removeItem('apiKey');
          setApiKey('');
          setShowApiKeyInput(true);
          handleReset();
        } catch (error) {
          console.error("Error clearing localStorage:", error);
          setMessage('Error clearing API Key. Please try again.');
        }
      };

      const handleReset = () => {
        setImage(null);
        setAltText('');
        setMessage('');
        setIsDragging(false);
        setIsLoading(false);
      };

      return (
        <div className="min-h-screen bg-[#5E0009] flex flex-col items-center p-4 font-sans text-gray-100">
          <div className="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-xl border border-gray-200">
            <div className="flex flex-col items-center mb-6">
              <img
                src="https://marvel-b1-cdn.bc0a.com/f00000000271534/brand.missouristate.edu/_Files/logos-m.png"
                alt="Missouri State University Bear Head logo and wordmark"
                className="mb-4"
              />
              <h1 className="text-3xl md:text-4xl font-extrabold text-[#5E0009] text-center">
                Missouri State Alt Text Generator
              </h1>
            </div>
            <p className="text-center text-gray-600 mb-8">
              Drag and drop an image or click to upload. The app will automatically
              generate descriptive alt text for accessibility.
            </p>
            
            {showApiKeyInput ? (
              <div className="mb-6">
                <label htmlFor="api-key" className="block text-gray-800 font-bold mb-2">
                  Enter your Google API Key
                </label>
                <input
                  type="password"
                  id="api-key"
                  className="w-full p-2 rounded-lg border-2 border-gray-300 focus:outline-none focus:border-[#5E0009] text-gray-900"
                  placeholder="Paste your API key here..."
                  value={apiKey}
                  onChange={(e) => setApiKey(e.target.value)}
                />
                <button
                  onClick={saveApiKey}
                  className="mt-4 w-full px-6 py-3 bg-[#5E0009] text-white font-bold rounded-lg shadow-lg hover:bg-[#4E0008] transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-[#5E0009] focus:ring-opacity-75"
                >
                  Save API Key
                </button>
              </div>
            ) : (
              <>
                {/* Drag and Drop Area */}
                <div
                  className={`flex flex-col items-center justify-center p-8 rounded-xl transition-all duration-300 ease-in-out cursor-pointer text-gray-500
                    ${isDragging ? 'bg-[#D6C2C2] border-[#5E0009] border-4' : 'bg-gray-50 border-gray-300 border-2 border-dashed hover:bg-gray-100'}`}
                  onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                  onDragLeave={() => setIsDragging(false)}
                  onDrop={handleDrop}
                  onClick={() => document.getElementById('file-input').click()}
                >
                  <input
                    id="file-input"
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={handleFileChange}
                  />
                  {image ? (
                    <img src={image} alt="Uploaded preview" className="max-h-64 rounded-lg shadow-md" />
                  ) : (
                    <>
                      <p className="text-lg font-medium">Drag and drop an image here</p>
                      <p className="text-sm mt-1">- or -</p>
                      <p className="text-lg font-medium mt-1 text-[#5E0009]">Click to upload</p>
                    </>
                  )}
                </div>

                {/* Status and Output Section */}
                <div className="mt-8">
                  {isLoading && (
                    <div className="flex items-center justify-center text-lg text-[#5E0009] font-semibold space-x-2">
                      <div className="w-5 h-5 border-2 border-[#5E0009] border-t-transparent rounded-full animate-spin"></div>
                      <span>Generating alt text...</span>
                    </div>
                  )}

                  {message && !isLoading && (
                    <div className="bg-[#F3E5E6] text-[#5E0009] p-3 rounded-lg shadow-inner text-sm font-medium">
                      {message}
                    </div>
                  )}

                  {altText && !isLoading && (
                    <div className="mt-4">
                      <div className="relative p-5 bg-[#F3E5E6] rounded-xl shadow-lg border-l-4 border-[#5E0009]">
                        <p className="text-xl font-bold text-[#5E0009] mb-2">Generated Alt Text:</p>
                        <p className="text-gray-700 text-base leading-relaxed break-words">{altText}</p>
                        <button
                          onClick={copyToClipboard}
                          className="absolute top-4 right-4 p-2 rounded-full bg-[#5E0009] text-white hover:bg-[#4E0008] transition-colors duration-200 shadow-md focus:outline-none focus:ring-2 focus:ring-[#5E0009] focus:ring-opacity-75"
                          title="Copy to Clipboard"
                        >
                          <ClipboardIcon />
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Reset and Clear Key buttons */}
                  {(image || altText) && (
                    <div className="mt-6 flex justify-center space-x-4">
                      <button
                        onClick={handleReset}
                        className="px-6 py-3 bg-[#5E0009] text-white font-bold rounded-full shadow-lg hover:bg-[#4E0008] transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-[#5E0009] focus:ring-opacity-75"
                      >
                        Reset
                      </button>
                      <button
                        onClick={clearApiKey}
                        className="px-6 py-3 border-2 border-[#5E0009] text-[#5E0009] font-bold rounded-full shadow-lg hover:bg-[#F3E5E6] transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-[#5E0009] focus:ring-opacity-75"
                      >
                        Clear API Key
                      </button>
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
